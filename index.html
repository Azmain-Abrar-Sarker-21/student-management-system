<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎓Student Management System</h1>

        <label for="name">Student Name</label>
        <input type="text" id="name">

        <label for="age">Age</label>
        <input type="number" id="age">

        <label for="gpa">GPA</label>
        <input type="number" id="gpa" step="0.01">

        <label for="attendance">Attendance (%)</label>
        <input type="number" id="attendance">

        <label for="credits">Completed Credits</label>
        <input type="number" id="credits">

        <label for="failed">Failed Courses</label>
        <input type="number" id="failed">

        <label for="income">Family Income</label>
        <input type="number" id="income">

        <label for="fine">Library Fine</label>
        <input type="number" id="fine">

        <label for="tuition">Tuition Paid?</label>
        <select name="" id="tuition">
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <label for="disciplineh">Disciplinary Record?</label>
        <select name="" id="discipline">
            <option>No</option>
            <option>Yes</option>
        </select>

        <button onclick="checkStudent()">
            Check Student
        </button>

        <h2 id="result"></h2>


    </div>

    <script src="script.js"></script>

</body>
</html>
